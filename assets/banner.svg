<svg width="1200" height="420" viewBox="0 0 1200 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="mac-cleanup — safely reclaim disk and RAM on Apple Silicon macOS, for developers and creative pros">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0b1224"/>
      <stop offset="0.55" stop-color="#0e1a30"/>
      <stop offset="1" stop-color="#0a1526"/>
    </linearGradient>
    <linearGradient id="teal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2dd4bf"/>
      <stop offset="1" stop-color="#34d399"/>
    </linearGradient>
    <linearGradient id="gauge" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f59e0b"/>
      <stop offset="0.5" stop-color="#34d399"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#2dd4bf" stop-opacity="0.26"/>
      <stop offset="1" stop-color="#2dd4bf" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1.2" fill="#ffffff" fill-opacity="0.04"/>
    </pattern>
    <clipPath id="card"><rect x="0" y="0" width="1200" height="420" rx="22"/></clipPath>
  </defs>

  <!-- background (glow clipped to the rounded card so nothing bleeds past the corners) -->
  <g clip-path="url(#card)">
    <rect x="0" y="0" width="1200" height="420" fill="url(#bg)"/>
    <rect x="0" y="0" width="1200" height="420" fill="url(#dots)"/>
    <ellipse cx="930" cy="120" rx="360" ry="260" fill="url(#glow)"/>
  </g>
  <rect x="1.5" y="1.5" width="1197" height="417" rx="20.5" fill="none" stroke="#ffffff" stroke-opacity="0.08"/>

  <!-- ===== left: title block ===== -->
  <g font-family="ui-sans-serif, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
    <!-- emblem: sparkle (clean/refresh — profession-neutral) -->
    <g transform="translate(72,74)">
      <rect x="0" y="0" width="52" height="52" rx="14" fill="#0f2137" stroke="#2dd4bf" stroke-opacity="0.5"/>
      <path d="M24,11 L28.5,21.5 L39,26 L28.5,30.5 L24,41 L19.5,30.5 L9,26 L19.5,21.5 Z" fill="url(#teal)"/>
      <path d="M39,8.5 L40.6,12.4 L44.5,14 L40.6,15.6 L39,19.5 L37.4,15.6 L33.5,14 L37.4,12.4 Z" fill="#fbbf24"/>
    </g>
    <text x="140" y="98" font-size="15" letter-spacing="3" font-weight="700" fill="#5eead4">CLAUDE CODE SKILL</text>

    <text x="70" y="182" font-size="66" font-weight="800" fill="#f8fafc" letter-spacing="-1.5">mac-cleanup</text>
    <text x="72" y="228" font-size="24" font-weight="500" fill="#cbd5e1">Reclaim disk &amp; RAM on Apple Silicon macOS —</text>
    <text x="72" y="260" font-size="24" font-weight="500" fill="#cbd5e1">the safe, scan-first way.</text>

    <!-- feature chips (widths sized generously to the rendered text — no overflow) -->
    <g font-size="15" font-weight="600">
      <g transform="translate(72,300)">
        <rect width="176" height="34" rx="17" fill="#0f2137" stroke="#2dd4bf" stroke-opacity="0.35"/>
        <circle cx="21" cy="17" r="4" fill="#34d399"/>
        <text x="36" y="22" fill="#a7f3d0">Measures first</text>
      </g>
      <g transform="translate(260,300)">
        <rect width="244" height="34" rx="17" fill="#0f2137" stroke="#2dd4bf" stroke-opacity="0.35"/>
        <circle cx="21" cy="17" r="4" fill="#34d399"/>
        <text x="36" y="22" fill="#a7f3d0">Confirms before delete</text>
      </g>
      <g transform="translate(516,300)">
        <rect width="192" height="34" rx="17" fill="#0f2137" stroke="#2dd4bf" stroke-opacity="0.35"/>
        <circle cx="21" cy="17" r="4" fill="#34d399"/>
        <text x="36" y="22" fill="#a7f3d0">Regenerable only</text>
      </g>
    </g>
    <text x="72" y="372" font-size="14.5" fill="#64748b">Developers &amp; creative pros — caches · render/media scratch · proxies · app RAM</text>
  </g>

  <!-- ===== right: terminal card ===== -->
  <g transform="translate(742,86)" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
    <rect x="0" y="0" width="392" height="248" rx="16" fill="#070d1a" stroke="#1e293b"/>
    <!-- title bar -->
    <path d="M0,16 A16,16 0 0 1 16,0 H376 A16,16 0 0 1 392,16 V38 H0 Z" fill="#0d1526"/>
    <circle cx="22" cy="19" r="6" fill="#ff5f57"/>
    <circle cx="44" cy="19" r="6" fill="#febc2e"/>
    <circle cx="66" cy="19" r="6" fill="#28c840"/>
    <text x="200" y="24" text-anchor="middle" font-size="12.5" fill="#64748b">df -h /System/Volumes/Data</text>

    <!-- body -->
    <text x="22" y="76" font-size="14" fill="#5eead4">$ <tspan fill="#94a3b8">mac-cleanup: reclaimed space</tspan></text>

    <text x="22" y="112" font-size="13.5" fill="#64748b">before</text>
    <text x="150" y="112" font-size="13.5" fill="#f87171">7.5 GB free</text>
    <text x="22" y="140" font-size="13.5" fill="#64748b">after</text>
    <text x="150" y="140" font-size="13.5" fill="#5eead4">76 GB free</text>

    <!-- gauge -->
    <rect x="22" y="160" width="348" height="14" rx="7" fill="#111c30"/>
    <rect x="22" y="160" width="326" height="14" rx="7" fill="url(#gauge)"/>
    <text x="22" y="204" font-size="20" font-weight="700" fill="#f8fafc" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Roboto, sans-serif">+68 GB</text>
    <text x="118" y="204" font-size="13" fill="#64748b" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Roboto, sans-serif">reclaimed, nothing broken</text>
    <text x="22" y="230" font-size="12" fill="#475569">Final Cut · Lightroom · Logic · Docker · npm</text>
  </g>
</svg>
